<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AfterClaw Demo · Password Reset</title>
  <style>
    :root {
      --paper: #f4f1ea;
      --paper-2: #ebe7dd;
      --card: #fbf9f4;
      --ink: #251f17;
      --ink-2: #5a4f3f;
      --ink-3: #968a76;
      --rule-2: rgba(37,31,23,0.18);
      --accent: oklch(0.65 0.13 30);
      --accent-soft: oklch(0.65 0.13 30 / 0.16);
      --good: oklch(0.62 0.12 145);
      --warn: oklch(0.68 0.17 55);
      --bad: oklch(0.58 0.18 25);
      --shadow-2: 0 1px 0 rgba(37,31,23,0.04), 0 24px 60px -16px rgba(37,31,23,0.22);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(rgba(37,31,23,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,31,23,0.035) 1px, transparent 1px),
        var(--paper);
      background-size: 28px 28px, 28px 28px, auto;
      color: var(--ink);
      font-family: "Outfit", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      padding: 40px 20px;
    }
    .auth-card {
      width: min(420px, 100%);
      background: linear-gradient(170deg, var(--paper-2) 0%, var(--card) 60%);
      border: 1px solid var(--rule-2);
      border-radius: 20px;
      padding: 30px 28px 26px;
      box-shadow: var(--shadow-2), 0 0 0 1px rgba(255,255,255,0.04) inset;
      position: relative;
      overflow: hidden;
    }
    .auth-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      opacity: .9;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
    }
    .mascot {
      width: 30px; height: 30px; border-radius: 50%;
      border: 1.5px solid var(--ink);
      background-image: url("/web/ui/afterclaw-mascot.jpg");
      background-size: 220% auto;
      background-position: 78% 30%;
    }
    .brand {
      font-family: "Caveat", ui-rounded, "Segoe Script", cursive;
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
    }
    .brand b { color: var(--accent); }
    .head { text-align: center; margin-bottom: 16px; }
    .eyebrow {
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      font-size: 10px;
      letter-spacing: .20em;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 6px;
    }
    .title {
      margin: 0 0 8px;
      font-family: "Caveat", ui-rounded, "Segoe Script", cursive;
      font-size: 42px;
      line-height: 1;
    }
    .sub {
      margin: 0;
      font-size: 14px;
      color: var(--ink-3);
      line-height: 1.5;
    }
    .field {
      margin-top: 12px;
      position: relative;
    }
    .label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-2);
    }
    .input {
      width: 100%;
      border: 1px solid var(--rule-2);
      border-radius: 10px;
      background: #fffdf8;
      color: var(--ink);
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }
    .input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .pw-toggle {
      position: absolute;
      right: 9px;
      top: 33px;
      border: 0;
      background: transparent;
      color: var(--ink-3);
      font-size: 12px;
      cursor: pointer;
    }
    .strength-wrap { margin-top: 10px; }
    .strength-track {
      height: 6px;
      border-radius: 999px;
      background: rgba(37,31,23,.12);
      overflow: hidden;
    }
    .strength-bar {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: var(--bad);
      transition: width .2s, background .2s;
    }
    .strength-meta {
      margin-top: 6px;
      font-size: 12px;
      color: var(--ink-3);
      font-family: "IBM Plex Mono", ui-monospace, monospace;
    }
    .btn {
      margin-top: 16px;
      width: 100%;
      border: 0;
      border-radius: 11px;
      padding: 11px 14px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }
    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: var(--ink-3);
      text-align: center;
    }
  </style>
</head>
<body>
  <article class="auth-card">
    <div class="logo">
      <div class="mascot"></div>
      <div class="brand">after<b>Claw</b></div>
    </div>
    <div class="head">
      <div class="eyebrow">AFTERCLAW · PASSWORD</div>
      <h1 class="title">Reset password</h1>
      <p class="sub">Set a new password for your account.</p>
    </div>

    <div class="field">
      <label class="label" for="pw1">New password</label>
      <input id="pw1" class="input" type="password" placeholder="At least 8 characters" />
      <button id="toggle1" class="pw-toggle" type="button">show</button>
    </div>
    <div class="field">
      <label class="label" for="pw2">Confirm password</label>
      <input id="pw2" class="input" type="password" placeholder="Repeat password" />
      <button id="toggle2" class="pw-toggle" type="button">show</button>
    </div>

    <div class="strength-wrap">
      <div class="strength-track"><div id="bar" class="strength-bar"></div></div>
      <div id="meta" class="strength-meta">strength: weak</div>
    </div>

    <button class="btn" type="button">Reset now</button>
    <p class="hint">Demo only. Final page will post token + password to API.</p>
  </article>

  <script>
    const pw1 = document.getElementById("pw1");
    const pw2 = document.getElementById("pw2");
    const bar = document.getElementById("bar");
    const meta = document.getElementById("meta");

    function score(v) {
      let s = 0;
      if (v.length >= 8) s += 1;
      if (/[A-Z]/.test(v) && /[a-z]/.test(v)) s += 1;
      if (/\d/.test(v)) s += 1;
      if (/[^A-Za-z0-9]/.test(v)) s += 1;
      return s;
    }
    function paint() {
      const s = score(pw1.value);
      const pct = [0, 25, 50, 75, 100][s];
      bar.style.width = pct + "%";
      if (s <= 1) {
        bar.style.background = "var(--bad)";
        meta.textContent = "strength: weak";
      } else if (s <= 2) {
        bar.style.background = "var(--warn)";
        meta.textContent = "strength: medium";
      } else {
        bar.style.background = "var(--good)";
        meta.textContent = "strength: strong";
      }
      if (pw2.value && pw1.value !== pw2.value) meta.textContent += " · mismatch";
    }
    function bindToggle(btnId, input) {
      const btn = document.getElementById(btnId);
      btn.addEventListener("click", () => {
        input.type = input.type === "password" ? "text" : "password";
        btn.textContent = input.type === "password" ? "show" : "hide";
      });
    }
    pw1.addEventListener("input", paint);
    pw2.addEventListener("input", paint);
    bindToggle("toggle1", pw1);
    bindToggle("toggle2", pw2);
  </script>
</body>
</html>
